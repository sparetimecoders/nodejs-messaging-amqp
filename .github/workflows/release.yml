name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ steps.release.outputs.release_created }}
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        if: ${{ steps.release.outputs.release_created }}

      - name: Configure GitHub Packages auth
        if: ${{ steps.release.outputs.release_created }}
        run: |
          cat > bunfig.toml << 'TOML'
          [install.scopes]
          "@sparetimecoders" = { token = "${{ secrets.GITHUB_TOKEN }}", url = "https://npm.pkg.github.com" }
          TOML

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: bun install --frozen-lockfile

      - name: Build
        if: ${{ steps.release.outputs.release_created }}
        run: bun run build

      # GitHub Packages does not support OIDC trusted publishing
      - name: Publish # zizmor: ignore[use-trusted-publishing]
        if: ${{ steps.release.outputs.release_created }}
        run: bun publish --registry https://npm.pkg.github.com
        env:
          BUN_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
